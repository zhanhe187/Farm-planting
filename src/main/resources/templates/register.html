<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FPMS 注册</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
<section class="login-panel">
    <div class="login-hero register-hero">
        <div class="eyebrow">Farm Planting Management System</div>
        <h1>创建客户账号</h1>
        <p>新账号会直接写入 SQL Server，默认仅拥有客户销售记录查看权限。</p>
    </div>
    <div class="login-form">
        <h2>账号注册</h2>
        <p class="muted">用于进入智慧农场指挥中心，请妥善保管密码。</p>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <form method="post" action="/register" class="grid">
            <input name="username" placeholder="账号" autocomplete="username" required>
            <input name="displayName" placeholder="显示名称" autocomplete="name">
            <input name="password" type="password" placeholder="密码" autocomplete="new-password" required>
            <input name="confirmPassword" type="password" placeholder="确认密码" autocomplete="new-password" required>
            <button type="submit">创建账号</button>
        </form>
        <p class="auth-switch">已有账号？<a href="/login">返回登录</a></p>
    </div>
</section>
</body>
</html>
