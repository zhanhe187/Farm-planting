<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('采收溯源')}"></head>
<body>
<div class="shell">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="main">
        <div th:replace="~{fragments :: topbar('采收与溯源码', '采收前强制校验农药安全间隔期')}"></div>
        <div class="notice" th:if="${notice}" th:text="${notice}"></div>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <section class="card">
            <h2>采收预检</h2>
            <form method="get" action="/harvest" class="toolbar">
                <select name="batchId">
                    <option th:each="b : ${batches}" th:value="${b['ID'] ?: b['id']}" th:text="${b['BATCH_NO'] ?: b['batch_no']}"></option>
                </select>
                <button type="submit">预检</button>
            </form>
            <div th:if="${precheck}" th:class="${precheck.allowed} ? 'notice' : 'error'" th:text="${precheck.message}" style="margin-top:12px"></div>
        </section>
        <section class="card" style="margin-top:14px">
            <h2>登记采收</h2>
            <form method="post" action="/harvest" class="toolbar">
                <select name="batchId">
                    <option th:each="b : ${batches}" th:value="${b['ID'] ?: b['id']}" th:selected="${selectedBatchId == (b['ID'] ?: b['id'])}" th:text="${b['BATCH_NO'] ?: b['batch_no']}"></option>
                </select>
                <input type="date" name="harvestDate" value="2026-05-18">
                <input type="number" step="0.01" name="quantityKg" value="1280">
                <select name="grade">
                    <option value="A">A 级</option>
                    <option value="B">B 级</option>
                </select>
                <button type="submit">提交采收并生成追溯码</button>
            </form>
        </section>
        <section class="card" style="margin-top:14px">
            <h2>采收记录</h2>
            <table>
                <tr><th>日期</th><th>批次</th><th>作物</th><th>数量kg</th><th>等级</th><th>追溯</th></tr>
                <tr th:each="r : ${records}">
                    <td th:text="${r['HARVEST_DATE'] ?: r['harvest_date']}"></td>
                    <td th:text="${r['BATCH_NO'] ?: r['batch_no']}"></td>
                    <td th:text="${r['CROP_NAME'] ?: r['crop_name']}"></td>
                    <td th:text="${r['QUANTITY_KG'] ?: r['quantity_kg']}"></td>
                    <td th:text="${r['QUALITY_GRADE'] ?: r['quality_grade']}"></td>
                    <td><a class="button" th:href="@{'/trace/' + ${r['TRACE_CODE'] ?: r['trace_code']}}">公开页</a></td>
                </tr>
            </table>
        </section>
    </main>
</div>
</body>
</html>
