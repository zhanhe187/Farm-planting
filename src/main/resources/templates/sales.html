<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('销售记录')}"></head>
<body>
<div class="shell">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="main">
        <div th:replace="~{fragments :: topbar('销售记录', '记录农产品销售情况，关联批次追溯')}"></div>
        <div class="notice" th:if="${notice}" th:text="${notice}"></div>
        <section class="card">
            <h2>新增销售</h2>
            <form method="post" action="/sales" class="toolbar">
                <input name="customerName" placeholder="客户名称" required>
                <input name="productName" placeholder="产品名称" required>
                <input type="number" step="0.01" name="quantityKg" placeholder="数量(kg)" required>
                <input type="number" step="0.01" name="unitPrice" placeholder="单价(元/kg)" required>
                <input type="date" name="saleDate" required>
                <select name="batchId">
                    <option value="">不关联批次</option>
                    <option th:each="b : ${batches}" th:value="${b['ID'] ?: b['id']}"
                            th:text="${b['BATCH_NO'] ?: b['batch_no']}"></option>
                </select>
                <input name="note" placeholder="备注">
                <button type="submit">保存</button>
            </form>
        </section>
        <section class="card" style="margin-top:14px">
            <h2>销售流水</h2>
            <table>
                <tr><th>日期</th><th>客户</th><th>产品</th><th>数量(kg)</th><th>单价</th><th>金额</th><th>关联批次</th><th>备注</th></tr>
                <tr th:each="s : ${sales}">
                    <td th:text="${s['SALE_DATE'] ?: s['sale_date']}"></td>
                    <td th:text="${s['CUSTOMER_NAME'] ?: s['customer_name']}"></td>
                    <td th:text="${s['PRODUCT_NAME'] ?: s['product_name']}"></td>
                    <td th:text="${s['QUANTITY_KG'] ?: s['quantity_kg']}"></td>
                    <td th:text="${s['UNIT_PRICE'] ?: s['unit_price']}"></td>
                    <td th:text="${s['TOTAL_AMOUNT'] ?: s['total_amount']}"></td>
                    <td th:text="${s['BATCH_NO'] ?: s['batch_no'] ?: '-'}"></td>
                    <td th:text="${s['NOTE'] ?: s['note'] ?: ''}"></td>
                </tr>
            </table>
        </section>
    </main>
</div>
</body>
</html>
